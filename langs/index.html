<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    window.langName = "Languages";
    window.langDescription = "Browse and search programming languages in BytePedia.";
    window.langImage = "";
    window.langUrl = "https://bytepedia.kirze.de/langs";
  </script>

  <script src="/libs/components/main.js" defer></script>
</head>
<body>

  <main class="container">
    <a class="back-link" href="../">&larr; Back</a>

    <section class="lang-search" aria-labelledby="lang-search-title">
      <h2 id="lang-search-title">Find a language</h2>
      <label for="language-search" class="sr-only">Search languages</label>
      <input
        id="language-search"
        type="search"
        placeholder="Search languages..."
        autocomplete="on"
        aria-controls="language-results"
      >
      <div class="language-table-wrap" aria-live="polite">
        <table class="language-table">
          <thead>
            <tr>
              <th scope="col">Language</th>
              <th scope="col">Path</th>
            </tr>
          </thead>
          <tbody id="language-results"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 BytePedia</p>
  </footer>

  <script src="/libs/md-html/main.js"></script>
  <script src="/libs/lang-search/main.js"></script>
  <script>
    BytePedia.loadMarkdown('/langs/main.md', 'content');
    BytePediaLangSearch.init({
      inputId: 'language-search',
      resultsId: 'language-results',
      indexPath: '/langs/index.json'
    });
  </script>
</body>
</html>
