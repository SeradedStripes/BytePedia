<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Langs | BytePedia</title>
  <meta name="description" content="All programming languages in BytePedia">
  <meta property="og:title" content="BytePedia">
  <meta property="og:description" content="All programming languages in BytePedia">
  <meta property="og:image" content="/assets/logo-v1.svg">
  <meta property="og:url" content="${window.langUrl || window.location.href}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BytePedia">
  <meta name="twitter:description" content="All programming languages in BytePedia">
  <meta name="twitter:image" content="/assets/logo-v1.svg">
  <meta name="twitter:site" content="@BytePedia">
  <meta name="twitter:creator" content="@SeradedStripes">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <header class="hero">
    <div class="container">
      <img rel="preload" src="/assets/logo-v1.svg" alt="BytePedia Logo" width="72" height="72" style="vertical-align: middle; margin-right: 10px;">
      <nav class="header-nav" aria-label="Primary navigation">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/langs/">Languages</a></li>
          <li><a href="/contributing/">Contributing</a></li>
          <li><a href="/contributors/">Contributors</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="container">
    <a class="back-link" href="../">&larr; Back</a>

    <section class="lang-search" aria-labelledby="lang-search-title">
      <h2 id="lang-search-title">Find a language</h2>
      <h5 id="contribute">If you want to contribute go <a href="/contributing/">here</a></h5>
      <label for="language-search" class="sr-only">Search languages</label>
      <input
        id="language-search"
        type="search"
        placeholder="Search languages..."
        autocomplete="on"
        aria-controls="language-results"
      >
      <div class="language-table-wrap" aria-live="polite">
        <table class="language-table">
          <thead>
            <tr>
              <th scope="col">Language</th>
              <th scope="col">Path</th>
            </tr>
          </thead>
          <tbody id="language-results"></tbody>
        </table>
      </div>
    </section>

    <div id="lang-preview-panel" class="lang-preview-panel" hidden>
      <div class="lang-preview-bar">
        <span id="lang-preview-title" class="lang-preview-title"></span>
        <button id="lang-preview-close" class="lang-preview-close" aria-label="Close preview">&times;</button>
      </div>
      <div class="lang-preview-body">
        <div id="lang-preview-content" class="lang-content">Select a language from the list to view its information.</div>
        <div id="lang-preview-sources" class="lang-content"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 BytePedia</p>
  </footer>

  <script src="/libs/md-html/main.js"></script>
  <script src="/libs/lang-search/main.js"></script>
  <script>
    BytePediaLangSearch.init({
      inputId: 'language-search',
      resultsId: 'language-results',
      indexPath: '/langs/index.json'
    });
  </script>
</body>
</html>
