<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python | BytePedia</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1><a href="/" style="color:inherit;text-decoration:none;">BytePedia</a></h1>

            <nav class="header-nav" aria-label="Primary navigation">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/langs/">Languages</a></li>
                    <li><a href="/langs/python/">Python</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <a class="back-link" href="/">&larr; Back</a>
        <div class="lang-content" id="content">Loading...</div>
        
        <h2>Sources</h2>
        <ul id="sources-list"></ul>
    </main>

    <footer>
        <p>&copy; 2026 BytePedia</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('main.md')
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(() => {
                document.getElementById('content').textContent = 'Failed to load content.';
            });
    </script>
</body>
</html>
